<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Stage Music • Entrar por convite</title>
  <meta name="theme-color" content="#6d4aff" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/invite.css" />
  <link rel="stylesheet" href="css/mobile-audit.css" />
</head>
<body data-page="convite">
  <main class="invite-shell">
    <section class="invite-hero-card">
      <a class="back-link" href="index.html">← Início</a>
      <h1>Entrar na Sala Live</h1>
    </section>

    <section class="invite-card invite-form-card" aria-label="Entrar em uma sala">
      <div class="section-head">
        <div><h2>Código da sala</h2></div>
      </div>
      <label class="invite-code-label"><span>Código recebido</span><input id="invite-room-code" maxlength="10" autocapitalize="characters" autocomplete="off" inputmode="text" placeholder="ABC-123" /></label><button id="invite-scan-qr" class="btn btn-outline wide qr-scan-action" type="button">Ler QR</button>
      <label class="invite-name-label"><span>Seu nome</span><input id="invite-display-name" maxlength="60" autocomplete="name" placeholder="Ex.: Ana, João, Teclado 1" /></label>

      <div class="section-head compact">
        <div><h2>Escolha sua leitura</h2></div>
      </div>
      <div class="invite-role-grid" role="group" aria-label="Escolha sua função">
        <button class="invite-role-card active" type="button" data-role="vocal" data-instrument="Vocal" data-view="lyrics"><strong>Letra</strong></button>
        <button class="invite-role-card" type="button" data-role="musico" data-instrument="Violão" data-view="chords"><strong>Cifra</strong></button>
        <button class="invite-role-card" type="button" data-role="diretor" data-instrument="Direção musical" data-view="director"><strong>Diretor</strong></button>
      </div>
      <label class="invite-instrument-label"><span>Instrumento ou função</span><select id="invite-instrument">
        <option>Vocal</option><option>Back vocal</option><option>Teclado</option><option>Violão</option><option>Guitarra</option><option>Baixo</option><option>Bateria</option><option>Sopros</option><option>Direção musical</option><option>Técnico de som</option><option>Outro</option>
      </select></label>
      <button id="invite-open-room" class="btn btn-primary wide invite-main-action" type="button">Entrar</button>
    </section>
  </main>

  <nav class="bottom-nav mobile-only">
    <a href="index.html">Início</a>
    <a class="active" href="convite.html">Entrar</a>
    <a href="sala-live.html">Sala</a>
    <a href="modo-live.html">Live</a>
    <a href="login-cifra.html">Conta</a>
  </nav>
  <div id="invite-toast" class="stage-toast" role="status" aria-live="polite"></div>
  <script src="js/build-info.js"></script>
  <script src="js/resilience.js"></script>
  <script src="js/live-sharing-core.js"></script>
  <script src="js/qr-scanner.js"></script>
  <script src="js/invite.js"></script>
  <script src="js/mobile-audit.js"></script>
<span data-build-info hidden></span></body>
</html>
