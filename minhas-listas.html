<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stage Music • Minhas listas</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
  <link rel="stylesheet" href="css/global.css" />
</head>
<body data-page="minhas-listas">
  <main class="page-shell">
    <header class="page-header">
      <a href="index.html" class="back-link">← Início</a>
      <span class="visual-badge">Setlists e repertório</span>
      <h1>Minhas listas</h1>

    </header>
    <section class="two-column">
      <div class="placeholder-card">

        <div class="list-row"><div><strong>Show Acústico</strong><small>10 músicas • versão pocket</small></div><span class="status-pill">Acústico</span></div>

      <div class="mockup-card">
        <img src="assets/illustrations/lists-reference.png" alt="Referência visual de Minhas Listas" />
      </div>

  </main>
  <footer class="app-footer"><span id="build-info" data-build-info>Carregando informações da build…</span></footer>
  <script src="js/build-info.js"></script>
