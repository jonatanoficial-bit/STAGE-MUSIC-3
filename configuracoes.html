<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stage Music • Configurações</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
  <link rel="stylesheet" href="css/global.css" />
</head>
<body data-page="configuracoes">
  <main class="page-shell">
    <header class="page-header">
      <a href="index.html" class="back-link">← Início</a>
      <span class="visual-badge">Preferências do app</span>
      <h1>Configurações</h1>
      <p>Base para ajustes de tema, leitura, sincronização e comportamento do Stage Music.</p>
    </header>
    <section class="placeholder-card settings-grid">
      <label class="setting-item"><span>Tema claro</span><input type="checkbox" checked /></label>
      <label class="setting-item"><span>Fonte grande</span><input type="checkbox" /></label>
      <label class="setting-item"><span>Rolagem automática</span><input type="checkbox" /></label>
      <label class="setting-item"><span>Sincronização online</span><input type="checkbox" /></label>
    </section>
  </main>
  <footer class="app-footer"><span id="build-info" data-build-info>Carregando informações da build…</span></footer>
  <script src="js/build-info.js"></script>
  <script src="js/resilience.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
